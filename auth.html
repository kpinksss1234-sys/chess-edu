<!DOCTYPE html>
<html lang="ko" data-color-mode="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>체스 분석 보드 — 로그인</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet">

<!-- Firebase SDK -->
<script type="module">
  import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
  import {
    getAuth,
    createUserWithEmailAndPassword,
    signInWithEmailAndPassword,
    signInWithPopup,
    GoogleAuthProvider,
    onAuthStateChanged,
    signOut,
    updateProfile
  } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';
  import {
    getFirestore,
    doc,
    setDoc,
    getDoc,
    serverTimestamp
  } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

  // ─────────────────────────────────────────────
  // 🔥 여기에 Firebase 프로젝트 설정을 입력하세요
  // ─────────────────────────────────────────────
  const firebaseConfig = {
    apiKey: "AIzaSyDiBFoUf2QVG9QXO34Xny0bSslFYaiwozg",
    authDomain: "chess-education-464fc.firebaseapp.com",
    projectId: "chess-education-464fc",
    storageBucket: "chess-education-464fc.firebasestorage.app",
    messagingSenderId: "963998720041",
    appId: "1:963998720041:web:aa4037707214d3777c7c38",
    measurementId: "G-HBS1RQ4WYQ"
  };
  // ─────────────────────────────────────────────

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);
  const googleProvider = new GoogleAuthProvider();

  // Firestore에 사용자 문서 생성/업데이트
  async function upsertUserDoc(user, extra = {}) {
    const ref = doc(db, 'users', user.uid);
    const snap = await getDoc(ref);
    if (!snap.exists()) {
      await setDoc(ref, {
        uid: user.uid,
        email: user.email,
        displayName: user.displayName || extra.displayName || '',
        photoURL: user.photoURL || '',
        createdAt: serverTimestamp(),
        gamesPlayed: 0,
        rating: 1200,
        ...extra
      });
    }
  }

  // 로그인 상태 감지
  onAuthStateChanged(auth, (user) => {
    if (user) {
      // 로그인 성공 → 체스 분석 보드로 자동 이동
      window.location.href = 'https://chess-education.vercel.app/chess-wasm-fixed.html';
    } else {
      showAuthForms();
    }
  });

  // ── 회원가입 ──
  window.handleSignup = async () => {
    const name     = document.getElementById('signup-name').value.trim();
    const email    = document.getElementById('signup-email').value.trim();
    const password = document.getElementById('signup-password').value;
    const confirm  = document.getElementById('signup-confirm').value;

    if (!name || !email || !password) return showError('signup', '모든 항목을 입력해주세요.');
    if (password !== confirm)         return showError('signup', '비밀번호가 일치하지 않습니다.');
    if (password.length < 6)          return showError('signup', '비밀번호는 6자 이상이어야 합니다.');

    setLoading('signup', true);
    try {
      const cred = await createUserWithEmailAndPassword(auth, email, password);
      await updateProfile(cred.user, { displayName: name });
      await upsertUserDoc(cred.user, { displayName: name });
      showSuccess('signup', '회원가입 완료! 환영합니다 ♟');
    } catch (e) {
      showError('signup', firebaseErrorMsg(e.code));
    } finally {
      setLoading('signup', false);
    }
  };

  // ── 로그인 ──
  window.handleLogin = async () => {
    const email    = document.getElementById('login-email').value.trim();
    const password = document.getElementById('login-password').value;

    if (!email || !password) return showError('login', '이메일과 비밀번호를 입력해주세요.');

    setLoading('login', true);
    try {
      await signInWithEmailAndPassword(auth, email, password);
    } catch (e) {
      showError('login', firebaseErrorMsg(e.code));
    } finally {
      setLoading('login', false);
    }
  };

  // ── Google 로그인 ──
  window.handleGoogle = async () => {
    try {
      const result = await signInWithPopup(auth, googleProvider);
      await upsertUserDoc(result.user);
    } catch (e) {
      showError('login', firebaseErrorMsg(e.code));
    }
  };

  // ── 로그아웃 ──
  window.handleLogout = () => signOut(auth);

  // ── Firestore에서 추가 유저 정보 가져오기 ──
  async function showUserInfo(user) {
    document.getElementById('auth-container').classList.add('hidden');
    const panel = document.getElementById('user-panel');
    panel.classList.remove('hidden');

    document.getElementById('user-avatar-letter').textContent =
      (user.displayName || user.email || '?')[0].toUpperCase();
    document.getElementById('user-name').textContent  = user.displayName || '이름 없음';
    document.getElementById('user-email').textContent = user.email;

    try {
      const snap = await getDoc(doc(db, 'users', user.uid));
      if (snap.exists()) {
        const d = snap.data();
        document.getElementById('user-rating').textContent = d.rating ?? 1200;
        document.getElementById('user-games').textContent  = d.gamesPlayed ?? 0;
        document.getElementById('user-joined').textContent = d.createdAt
          ? new Date(d.createdAt.seconds * 1000).toLocaleDateString('ko-KR')
          : '—';
      }
    } catch (_) {}
  }

  function showAuthForms() {
    document.getElementById('auth-container').classList.remove('hidden');
    document.getElementById('user-panel').classList.add('hidden');
  }

  // ── Firebase 에러 한국어 변환 ──
  function firebaseErrorMsg(code) {
    const map = {
      'auth/email-already-in-use':    '이미 사용 중인 이메일입니다.',
      'auth/invalid-email':           '유효하지 않은 이메일 형식입니다.',
      'auth/weak-password':           '비밀번호가 너무 약합니다.',
      'auth/user-not-found':          '존재하지 않는 계정입니다.',
      'auth/wrong-password':          '비밀번호가 틀렸습니다.',
      'auth/invalid-credential':      '이메일 또는 비밀번호가 올바르지 않습니다.',
      'auth/popup-closed-by-user':    'Google 로그인이 취소되었습니다.',
      'auth/network-request-failed':  '네트워크 오류가 발생했습니다.',
      'auth/too-many-requests':       '너무 많은 시도입니다. 잠시 후 다시 시도해주세요.',
    };
    return map[code] || `오류가 발생했습니다. (${code})`;
  }

  function showError(form, msg) {
    const el = document.getElementById(`${form}-error`);
    el.textContent = msg;
    el.classList.remove('hidden');
    // 카드 흔들기
    const card = document.getElementById(`card-${form}`);
    card.classList.remove('shake-error');
    void card.offsetWidth;
    card.classList.add('shake-error');
    card.addEventListener('animationend', () => card.classList.remove('shake-error'), { once: true });
    setTimeout(() => el.classList.add('hidden'), 4000);
  }
  function showSuccess(form, msg) {
    const el = document.getElementById(`${form}-success`);
    el.textContent = msg;
    el.classList.remove('hidden');
  }
  function setLoading(form, on) {
    const btn = document.getElementById(`${form}-btn`);
    btn.disabled = on;
    btn.querySelector('.btn-text').style.opacity = on ? '0' : '1';
    btn.querySelector('.btn-spinner').style.display = on ? 'block' : 'none';
  }
</script>

<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }

:root {
  --bg-primary:   #1a1a1a;
  --bg-secondary: #242424;
  --bg-tertiary:  #2d2d2d;
  --bg-card:      #1e1e1e;
  --border:       #3a3a3a;
  --border-light: #444444;
  --text-primary: #e8e8e8;
  --text-secondary:#a0a0a0;
  --text-muted:   #666666;
  --accent-green: #7fa650;
  --accent-green-bright: #a0c060;
  --accent-green-dark:   #5a8030;
  --board-light:  #f0d9b5;
  --board-dark:   #b58863;
  --font-main: 'Noto Sans KR', sans-serif;
  --font-display: 'Playfair Display', serif;
}

body {
  font-family: var(--font-main);
  background: var(--bg-primary);
  color: var(--text-primary);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  overflow: hidden;
}

/* ── 배경 체스판 패턴 ── */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image:
    repeating-conic-gradient(
      rgba(255,255,255,0.018) 0% 25%,
      transparent 0% 50%
    );
  background-size: 64px 64px;
  pointer-events: none;
  z-index: 0;
}
body::after {
  content: '';
  position: fixed;
  inset: 0;
  background: radial-gradient(ellipse 80% 60% at 50% 40%,
    rgba(127,166,80,0.06) 0%,
    transparent 70%);
  pointer-events: none;
  z-index: 0;
}

/* ── 떠다니는 체스 말 ── */
.floating-pieces {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 0;
  overflow: hidden;
}
.fp {
  position: absolute;
  font-size: 2.5rem;
  opacity: 0.04;
  animation: floatPiece linear infinite;
  user-select: none;
}
@keyframes floatPiece {
  0%   { transform: translateY(110vh) rotate(0deg); opacity: 0; }
  10%  { opacity: 0.04; }
  90%  { opacity: 0.04; }
  100% { transform: translateY(-10vh) rotate(360deg); opacity: 0; }
}

/* ── 메인 레이아웃 ── */
#auth-container {
  position: relative;
  z-index: 10;
  width: 100%;
  max-width: 480px;
  padding: 20px;
}
#auth-container.hidden { display: none; }

/* ── 로고 영역 ── */
.logo-area {
  text-align: center;
  margin-bottom: 36px;
  animation: fadeDown 0.6s ease both;
}
.logo-icon {
  width: 64px; height: 64px;
  background: linear-gradient(135deg, var(--accent-green), var(--accent-green-dark));
  border-radius: 18px;
  display: flex; align-items: center; justify-content: center;
  font-size: 32px;
  margin: 0 auto 16px;
  box-shadow: 0 8px 32px rgba(127,166,80,0.3);
}
.logo-title {
  font-family: var(--font-display);
  font-size: 2rem;
  font-weight: 900;
  color: var(--text-primary);
  letter-spacing: -0.5px;
}
.logo-sub {
  font-size: 0.8rem;
  color: var(--text-muted);
  letter-spacing: 0.15em;
  text-transform: uppercase;
  margin-top: 4px;
}

/* ── 탭 ── */
.tab-bar {
  display: flex;
  background: var(--bg-secondary);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 4px;
  margin-bottom: 24px;
  animation: fadeDown 0.6s 0.1s ease both;
}
.tab-btn {
  flex: 1;
  padding: 10px;
  border: none;
  background: transparent;
  color: var(--text-muted);
  font-family: var(--font-main);
  font-size: 0.875rem;
  font-weight: 500;
  border-radius: 10px;
  cursor: pointer;
  transition: all 0.2s;
}
.tab-btn.active {
  background: var(--accent-green);
  color: #fff;
  box-shadow: 0 4px 12px rgba(127,166,80,0.35);
}

/* ── 카드 ── */
.auth-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 32px;
  animation: fadeUp 0.5s 0.15s ease both;
  backdrop-filter: blur(8px);
}
.auth-card.hidden { display: none; }

/* ── 폼 요소 ── */
.field {
  margin-bottom: 16px;
}
.field label {
  display: block;
  font-size: 0.78rem;
  font-weight: 600;
  color: var(--text-secondary);
  letter-spacing: 0.05em;
  text-transform: uppercase;
  margin-bottom: 7px;
}
.input-wrap {
  position: relative;
}
.input-wrap svg {
  position: absolute;
  left: 14px;
  top: 50%;
  transform: translateY(-50%);
  width: 16px; height: 16px;
  color: var(--text-muted);
  pointer-events: none;
}
.field input {
  width: 100%;
  padding: 12px 44px 12px 40px;
  background: var(--bg-tertiary);
  border: 1px solid var(--border);
  border-radius: 10px;
  color: var(--text-primary);
  font-family: var(--font-main);
  font-size: 0.9rem;
  outline: none;
  transition: border-color 0.2s, box-shadow 0.2s;
}
.field input:focus {
  border-color: var(--accent-green);
  box-shadow: 0 0 0 3px rgba(127,166,80,0.15);
}
.field input::placeholder { color: var(--text-muted); }

/* ── 버튼 ── */
.btn-primary {
  width: 100%;
  padding: 13px;
  background: linear-gradient(135deg, var(--accent-green), var(--accent-green-dark));
  border: none;
  border-radius: 11px;
  color: #fff;
  font-family: var(--font-main);
  font-size: 0.95rem;
  font-weight: 600;
  cursor: pointer;
  position: relative;
  margin-top: 4px;
  transition: opacity 0.2s, transform 0.15s, box-shadow 0.2s;
  box-shadow: 0 4px 16px rgba(127,166,80,0.3);
}
.btn-primary:hover:not(:disabled) {
  opacity: 0.92;
  transform: translateY(-1px);
  box-shadow: 0 6px 20px rgba(127,166,80,0.4);
}
.btn-primary:disabled { cursor: not-allowed; opacity: 0.7; }
.btn-text { transition: opacity 0.2s; }
.btn-spinner {
  display: none;
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  width: 20px; height: 20px;
  border: 2px solid rgba(255,255,255,0.3);
  border-top-color: #fff;
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
}
@keyframes spin { to { transform: translate(-50%,-50%) rotate(360deg); } }

.btn-google {
  width: 100%;
  padding: 12px;
  background: var(--bg-tertiary);
  border: 1px solid var(--border-light);
  border-radius: 11px;
  color: var(--text-primary);
  font-family: var(--font-main);
  font-size: 0.875rem;
  font-weight: 500;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center; gap: 10px;
  transition: background 0.2s, border-color 0.2s;
  margin-top: 12px;
}
.btn-google:hover {
  background: var(--bg-hover, #333);
  border-color: var(--border-light);
}
.google-icon {
  width: 18px; height: 18px;
}

/* ── 구분선 ── */
.divider {
  display: flex; align-items: center; gap: 12px;
  margin: 20px 0;
  color: var(--text-muted);
  font-size: 0.75rem;
}
.divider::before, .divider::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--border);
}

/* ── 메시지 ── */
.msg {
  padding: 10px 14px;
  border-radius: 9px;
  font-size: 0.82rem;
  margin-bottom: 14px;
  font-weight: 500;
}
.msg.error   { background: rgba(192,64,64,0.15); color: #e07070; border: 1px solid rgba(192,64,64,0.3); }
.msg.success { background: rgba(127,166,80,0.15); color: var(--accent-green-bright); border: 1px solid rgba(127,166,80,0.3); }
.msg.hidden  { display: none; }

/* ── 유저 패널 ── */
#user-panel {
  position: relative;
  z-index: 10;
  width: 100%;
  max-width: 440px;
  padding: 20px;
  animation: fadeUp 0.5s ease both;
}
#user-panel.hidden { display: none; }

.profile-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 24px;
  padding: 36px 32px;
  text-align: center;
}

.avatar {
  width: 80px; height: 80px;
  background: linear-gradient(135deg, var(--accent-green), var(--accent-green-dark));
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 2rem;
  font-weight: 700;
  color: #fff;
  margin: 0 auto 20px;
  box-shadow: 0 8px 24px rgba(127,166,80,0.4);
}

.profile-name {
  font-family: var(--font-display);
  font-size: 1.6rem;
  font-weight: 700;
  margin-bottom: 4px;
}
.profile-email {
  font-size: 0.82rem;
  color: var(--text-muted);
  margin-bottom: 28px;
}

.stats-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 12px;
  margin-bottom: 28px;
}
.stat-box {
  background: var(--bg-tertiary);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 14px 8px;
}
.stat-val {
  font-size: 1.4rem;
  font-weight: 700;
  color: var(--accent-green-bright);
  font-family: var(--font-display);
}
.stat-lbl {
  font-size: 0.7rem;
  color: var(--text-muted);
  margin-top: 3px;
  text-transform: uppercase;
  letter-spacing: 0.05em;
}

.btn-logout {
  width: 100%;
  padding: 12px;
  background: transparent;
  border: 1px solid var(--border);
  border-radius: 11px;
  color: var(--text-secondary);
  font-family: var(--font-main);
  font-size: 0.875rem;
  cursor: pointer;
  transition: all 0.2s;
  display: flex; align-items: center; justify-content: center; gap: 8px;
}
.btn-logout:hover {
  border-color: #c04040;
  color: #e07070;
  background: rgba(192,64,64,0.08);
}

.go-to-chess {
  width: 100%;
  padding: 13px;
  background: linear-gradient(135deg, var(--accent-green), var(--accent-green-dark));
  border: none;
  border-radius: 11px;
  color: #fff;
  font-family: var(--font-main);
  font-size: 0.95rem;
  font-weight: 600;
  cursor: pointer;
  margin-bottom: 10px;
  display: flex; align-items: center; justify-content: center; gap: 8px;
  transition: opacity 0.2s, transform 0.15s;
  box-shadow: 0 4px 16px rgba(127,166,80,0.3);
  text-decoration: none;
}
.go-to-chess:hover { opacity: 0.9; transform: translateY(-1px); }

/* ── 애니메이션 ── */
@keyframes fadeDown {
  from { opacity: 0; transform: translateY(-16px); }
  to   { opacity: 1; transform: translateY(0); }
}
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(16px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* ── 비밀번호 표시 토글 ── */
.toggle-pw {
  position: absolute;
  right: 10px;
  top: 50%;
  transform: translateY(-50%);
  background: none;
  border: none;
  color: var(--text-muted);
  cursor: pointer;
  padding: 4px;
  width: 28px;
  height: 28px;
  display: flex;
  align-items: center;
  justify-content: center;
  line-height: 1;
  transition: color 0.2s;
  z-index: 2;
}
.toggle-pw:hover { color: var(--text-secondary); }

/* ── 비밀번호 포커스 시 배경 흐림 ── */
.floating-pieces {
  transition: filter 0.5s ease, opacity 0.5s ease;
}
.floating-pieces.blurred {
  filter: blur(8px);
  opacity: 0.15;
}

/* ── 로고 아이콘 비밀번호 포커스 시 반응 ── */
.logo-icon {
  transition: filter 0.4s ease, transform 0.4s ease;
}
.logo-icon.peeking {
  filter: blur(3px);
  transform: scale(0.9) rotate(-5deg);
}

/* ── 로그인 실패 흔들림 (체크메이트!) ── */
@keyframes shake {
  0%   { transform: translateX(0); }
  15%  { transform: translateX(-7px) rotate(-0.5deg); }
  30%  { transform: translateX(7px) rotate(0.5deg); }
  45%  { transform: translateX(-5px); }
  60%  { transform: translateX(5px); }
  75%  { transform: translateX(-3px); }
  90%  { transform: translateX(3px); }
  100% { transform: translateX(0); }
}
.shake-error {
  animation: shake 0.45s ease-in-out;
}

/* ── 버튼 체스 말 슬라이드 ── */
.btn-chess-piece {
  display: inline-block;
  font-size: 1.05em;
  transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
  will-change: transform;
}
.btn-primary:hover:not(:disabled) .btn-chess-piece {
  transform: translateX(5px);
}
.btn-primary:active:not(:disabled) .btn-chess-piece {
  transform: translateX(14px) scale(1.25);
}

/* ── 탭 전환 3D Flip ── */
.auth-card {
  transition: opacity 0.2s ease, transform 0.3s ease;
  transform-origin: center top;
}
.auth-card.flip-out {
  opacity: 0;
  transform: rotateX(-10deg) translateY(-6px) scale(0.97);
  pointer-events: none;
}
@keyframes flipIn {
  from { opacity: 0; transform: rotateX(10deg) translateY(6px) scale(0.97); }
  to   { opacity: 1; transform: rotateX(0deg) translateY(0) scale(1); }
}
.auth-card.flip-in {
  animation: flipIn 0.3s ease forwards;
}
</style>
<link rel="stylesheet" href="theme-ui.css">
</head>
<body>

<!-- 떠다니는 체스 말 배경 -->
<div class="floating-pieces" id="floating-pieces"></div>

<!-- ══════════════════════════════════ AUTH ══════════════════════════════════ -->
<div id="auth-container">
  <div class="logo-area">
    <div class="logo-icon">♟</div>
    <div class="logo-title">Chess Analysis</div>
    <div class="logo-sub">Powered by Stockfish 18</div>
  </div>

  <!-- 탭 -->
  <div class="tab-bar">
    <button class="tab-btn active" id="tab-login"  onclick="switchTab('login')">로그인</button>
    <button class="tab-btn"        id="tab-signup" onclick="switchTab('signup')">회원가입</button>
  </div>

  <!-- ── 로그인 폼 ── -->
  <div class="auth-card" id="card-login">
    <div class="msg error  hidden" id="login-error"></div>
    <div class="msg success hidden" id="login-success"></div>

    <div class="field">
      <label>이메일</label>
      <div class="input-wrap">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="2" y="4" width="20" height="16" rx="2"/>
          <path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/>
        </svg>
        <input type="email" id="login-email" placeholder="example@email.com"
               onkeydown="if(event.key==='Enter')handleLogin()">
      </div>
    </div>

    <div class="field">
      <label>비밀번호</label>
      <div class="input-wrap">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="3" y="11" width="18" height="11" rx="2"/>
          <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
        </svg>
        <input type="password" id="login-password" placeholder="••••••••"
               onkeydown="if(event.key==='Enter')handleLogin()">
        <button class="toggle-pw" onclick="togglePw('login-password',this)" type="button">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
            <circle cx="12" cy="12" r="3"/>
          </svg>
        </button>
      </div>
    </div>

    <button class="btn-primary" id="login-btn" onclick="handleLogin()">
      <span class="btn-text">로그인 <span class="btn-chess-piece">♙</span></span>
      <div class="btn-spinner"></div>
    </button>

    <div class="divider">또는</div>

    <button class="btn-google" onclick="handleGoogle()">
      <svg class="google-icon" viewBox="0 0 24 24">
        <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
        <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
        <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
        <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
      </svg>
      Google로 계속하기
    </button>
  </div>

  <!-- ── 회원가입 폼 ── -->
  <div class="auth-card hidden" id="card-signup">
    <div class="msg error  hidden" id="signup-error"></div>
    <div class="msg success hidden" id="signup-success"></div>

    <div class="field">
      <label>닉네임</label>
      <div class="input-wrap">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="8" r="4"/>
          <path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/>
        </svg>
        <input type="text" id="signup-name" placeholder="체스 닉네임">
      </div>
    </div>

    <div class="field">
      <label>이메일</label>
      <div class="input-wrap">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="2" y="4" width="20" height="16" rx="2"/>
          <path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/>
        </svg>
        <input type="email" id="signup-email" placeholder="example@email.com">
      </div>
    </div>

    <div class="field">
      <label>비밀번호</label>
      <div class="input-wrap">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="3" y="11" width="18" height="11" rx="2"/>
          <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
        </svg>
        <input type="password" id="signup-password" placeholder="6자 이상">
        <button class="toggle-pw" onclick="togglePw('signup-password',this)" type="button">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
            <circle cx="12" cy="12" r="3"/>
          </svg>
        </button>
      </div>
    </div>

    <div class="field">
      <label>비밀번호 확인</label>
      <div class="input-wrap">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="3" y="11" width="18" height="11" rx="2"/>
          <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
        </svg>
        <input type="password" id="signup-confirm" placeholder="비밀번호 재입력"
               onkeydown="if(event.key==='Enter')handleSignup()">
        <button class="toggle-pw" onclick="togglePw('signup-confirm',this)" type="button">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
            <circle cx="12" cy="12" r="3"/>
          </svg>
        </button>
      </div>
    </div>

    <button class="btn-primary" id="signup-btn" onclick="handleSignup()">
      <span class="btn-text">계정 만들기 <span class="btn-chess-piece">♙</span></span>
      <div class="btn-spinner"></div>
    </button>

    <div class="divider">또는</div>

    <button class="btn-google" onclick="handleGoogle()">
      <svg class="google-icon" viewBox="0 0 24 24">
        <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
        <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
        <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
        <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
      </svg>
      Google로 계속하기
    </button>
  </div>
</div>

<!-- ══════════════════════════════════ USER PANEL ══════════════════════════════════ -->
<div id="user-panel" class="hidden">
  <div class="logo-area" style="margin-bottom: 24px;">
    <div class="logo-icon">♟</div>
    <div class="logo-title">Chess Analysis</div>
  </div>

  <div class="profile-card">
    <div class="avatar" id="user-avatar-letter">?</div>
    <div class="profile-name" id="user-name">—</div>
    <div class="profile-email" id="user-email">—</div>

    <div class="stats-grid">
      <div class="stat-box">
        <div class="stat-val" id="user-rating">—</div>
        <div class="stat-lbl">레이팅</div>
      </div>
      <div class="stat-box">
        <div class="stat-val" id="user-games">—</div>
        <div class="stat-lbl">게임 수</div>
      </div>
      <div class="stat-box">
        <div class="stat-val" id="user-joined">—</div>
        <div class="stat-lbl">가입일</div>
      </div>
    </div>

    <a href="https://chess-education.vercel.app/chess-wasm-fixed.html" class="go-to-chess">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <path d="M5 12h14M12 5l7 7-7 7"/>
      </svg>
      체스 분석 시작하기
    </a>

    <button class="btn-logout" onclick="handleLogout()">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
        <polyline points="16 17 21 12 16 7"/>
        <line x1="21" y1="12" x2="9" y2="12"/>
      </svg>
      로그아웃
    </button>
  </div>
</div>

<script>
// ── 탭 전환 (3D Flip) ──
function switchTab(tab) {
  const loginCard  = document.getElementById('card-login');
  const signupCard = document.getElementById('card-signup');
  const showCard   = tab === 'login' ? loginCard : signupCard;
  const hideCard   = tab === 'login' ? signupCard : loginCard;

  // 현재 카드 flip-out
  hideCard.classList.remove('flip-in');
  hideCard.classList.add('flip-out');
  setTimeout(() => {
    hideCard.classList.add('hidden');
    hideCard.classList.remove('flip-out');
  }, 200);

  // 새 카드 flip-in
  showCard.classList.remove('hidden');
  showCard.classList.remove('flip-out');
  showCard.classList.add('flip-in');
  setTimeout(() => showCard.classList.remove('flip-in'), 350);

  document.getElementById('tab-login').classList.toggle('active',  tab === 'login');
  document.getElementById('tab-signup').classList.toggle('active', tab === 'signup');
}

// ── 비밀번호 표시/숨김 ──
function togglePw(id, btn) {
  const inp = document.getElementById(id);
  const isText = inp.type === 'text';
  inp.type = isText ? 'password' : 'text';
  btn.style.color = isText ? '' : 'var(--accent-green)';
  // 비밀번호가 보일 때(text)만 블러 처리
  const bg = document.getElementById('floating-pieces');
  const logoIcon = document.querySelector('.logo-icon');
  const anyVisible = _pwIds.some(pid => document.getElementById(pid)?.type === 'text');
  if (anyVisible) {
    bg.classList.add('blurred');
    if (logoIcon) logoIcon.classList.add('peeking');
  } else {
    bg.classList.remove('blurred');
    if (logoIcon) logoIcon.classList.remove('peeking');
  }
  inp.focus();
}

// ── 비밀번호 입력 포커스 → 배경/로고 흐림 ──
const _pwIds = ['login-password', 'signup-password', 'signup-confirm'];



// ── 에러 시 카드 흔들림 ──
function shakeCard(form) {
  const card = document.getElementById(`card-${form}`);
  card.classList.remove('shake-error');
  void card.offsetWidth; // reflow
  card.classList.add('shake-error');
  card.addEventListener('animationend', () => card.classList.remove('shake-error'), { once: true });
}

// ── 버튼 클릭 시 폰 → 퀸 프로모션 효과 ──
function promotePiece(form) {
  const piece = document.querySelector(`#${form}-btn .btn-chess-piece`);
  if (!piece) return;
  piece.textContent = '♕';
  piece.style.transform = 'translateX(14px) scale(1.3)';
  setTimeout(() => {
    piece.style.transform = '';
    setTimeout(() => { piece.textContent = '♙'; }, 300);
  }, 400);
}

// ── showError 오버라이드: 흔들림 포함 ──
const _origShowError = window.showError;
window.showError = function(form, msg) {
  const el = document.getElementById(`${form}-error`);
  el.textContent = msg;
  el.classList.remove('hidden');
  shakeCard(form);
  setTimeout(() => el.classList.add('hidden'), 4000);
};

// ── 버튼 핸들러에 프로모션 효과 연결 ──
const loginBtn  = document.getElementById('login-btn');
const signupBtn = document.getElementById('signup-btn');
if (loginBtn)  loginBtn.addEventListener('mousedown',  () => promotePiece('login'));
if (signupBtn) signupBtn.addEventListener('mousedown', () => promotePiece('signup'));

// ── 떠다니는 체스 말 생성 ──
(function () {
  const pieces = ['♙','♘','♗','♖','♕','♔','♟','♞','♝','♜','♛','♚'];
  const container = document.getElementById('floating-pieces');
  for (let i = 0; i < 18; i++) {
    const el = document.createElement('div');
    el.className = 'fp';
    el.textContent = pieces[Math.floor(Math.random() * pieces.length)];
    el.style.left     = `${Math.random() * 100}%`;
    el.style.fontSize = `${1.5 + Math.random() * 2.5}rem`;
    const dur = 12 + Math.random() * 16;
    const delay = -(Math.random() * dur);
    el.style.animation = `floatPiece ${dur}s ${delay}s linear infinite`;
    container.appendChild(el);
  }
})();
</script>
</body>
</html>
