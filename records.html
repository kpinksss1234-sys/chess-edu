<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chess — 기보 기록</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
:root{
  --bg-primary:#1a1a1a;--bg-secondary:#242424;--bg-tertiary:#2d2d2d;
  --bg-card:#1e1e1e;--bg-hover:#333333;--border:#3a3a3a;--border-light:#444444;
  --text-primary:#e8e8e8;--text-secondary:#a0a0a0;--text-muted:#666666;
  --accent-green:#7fa650;--accent-green-bright:#a0c060;--accent-green-dark:#5a8030;
  --board-light:#f0d9b5;--board-dark:#b58863;
  --font-main:'Noto Sans KR',sans-serif;--font-display:'Playfair Display',serif;
}
body{font-family:var(--font-main);background:var(--bg-primary);color:var(--text-primary);display:flex;height:100vh;overflow:hidden}

/* SIDEBAR */
#sidebar{width:72px;background:var(--bg-secondary);border-right:1px solid var(--border);display:flex;flex-direction:column;align-items:center;padding:12px 0;gap:4px;flex-shrink:0;z-index:100}
.sidebar-logo{width:40px;height:40px;background:var(--accent-green);border-radius:10px;display:flex;align-items:center;justify-content:center;margin-bottom:12px;cursor:pointer;font-size:22px;transition:background .2s;text-decoration:none;color:inherit}
.sidebar-logo:hover{background:var(--accent-green-bright)}
.sidebar-nav{display:flex;flex-direction:column;align-items:center;gap:2px;width:100%;flex:1}
.sidebar-item{width:52px;height:52px;border-radius:12px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;gap:3px;transition:background .15s;text-decoration:none;color:inherit}
.sidebar-item:hover{background:var(--bg-hover)}
.sidebar-item.active{background:var(--bg-tertiary)}
.sidebar-item.active .sidebar-icon{color:var(--accent-green-bright)}
.sidebar-icon{width:22px;height:22px;color:var(--text-secondary);display:flex;align-items:center;justify-content:center}
.sidebar-label{font-size:9px;color:var(--text-muted);text-align:center;line-height:1}
.sidebar-item.active .sidebar-label{color:var(--accent-green-bright)}
.sidebar-divider{width:32px;height:1px;background:var(--border);margin:6px 0}
.sidebar-footer{display:flex;flex-direction:column;align-items:center;gap:4px;padding-top:8px;border-top:1px solid var(--border);width:100%}
.sidebar-user{width:52px;display:flex;flex-direction:column;align-items:center;gap:3px;padding:6px 0;cursor:default}
.sidebar-avatar{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,var(--accent-green),var(--accent-green-dark));display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:#fff}
.sidebar-username{font-size:8.5px;color:var(--text-muted);text-align:center;max-width:52px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;padding:0 2px}
.sidebar-item.logout-btn:hover{background:rgba(192,64,64,.12)}
.sidebar-item.logout-btn:hover .sidebar-icon{color:#e07070}

/* MAIN */
#main{flex:1;display:flex;overflow:hidden}

/* LIST PANEL */
#list-panel{width:320px;flex-shrink:0;background:var(--bg-secondary);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.list-header{padding:20px 20px 14px;border-bottom:1px solid var(--border);flex-shrink:0}
.list-title{font-family:var(--font-display);font-size:1.3rem;font-weight:900;color:var(--text-primary);margin-bottom:2px}
.list-sub{font-size:11px;color:var(--text-muted)}
#records-list{flex:1;overflow-y:auto;padding:12px}
#records-list::-webkit-scrollbar{width:4px}
#records-list::-webkit-scrollbar-thumb{background:var(--border-light);border-radius:2px}
.record-item{background:var(--bg-card);border:1px solid var(--border);border-radius:12px;padding:12px 14px;margin-bottom:8px;cursor:pointer;transition:border-color .15s,background .15s;display:flex;align-items:center;gap:12px}
.record-item:hover{border-color:var(--accent-green-dark);background:var(--bg-hover)}
.record-item.active{border-color:var(--accent-green);background:var(--bg-tertiary)}
.record-result-badge{width:36px;height:36px;border-radius:10px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:900}
.record-result-badge.win{background:rgba(127,166,80,.2);color:var(--accent-green-bright)}
.record-result-badge.lose{background:rgba(192,64,64,.15);color:#e07070}
.record-result-badge.draw{background:rgba(160,160,160,.15);color:var(--text-secondary)}
.record-info{flex:1;min-width:0}
.record-players{font-size:12px;font-weight:600;color:var(--text-primary);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:3px}
.record-meta{font-size:10px;color:var(--text-muted);display:flex;gap:8px}
.empty-state{text-align:center;padding:48px 20px;color:var(--text-muted);font-size:13px;line-height:1.7}
.empty-icon{font-size:36px;margin-bottom:12px;opacity:.5}

/* VIEWER PANEL */
#viewer-panel{flex:1;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden}
#viewer-panel::before{content:'';position:absolute;inset:0;background-image:repeating-conic-gradient(rgba(255,255,255,.015) 0% 25%,transparent 0% 50%);background-size:56px 56px;pointer-events:none}
#viewer-empty{position:relative;z-index:1;text-align:center;color:var(--text-muted)}
.viewer-empty-icon{font-size:52px;margin-bottom:16px;opacity:.3}
.viewer-empty-text{font-size:14px}
#viewer-container{display:none;position:relative;z-index:1;flex-direction:column;align-items:center;gap:12px;padding:16px;width:100%;height:100%;justify-content:center}
.viewer-player-bar{width:100%;max-width:480px;display:flex;align-items:center;justify-content:space-between;background:var(--bg-secondary);border:1px solid var(--border);border-radius:12px;padding:10px 16px}
.vp-info{display:flex;align-items:center;gap:10px}
.vp-avatar{width:30px;height:30px;border-radius:50%;background:var(--bg-hover);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:var(--text-primary)}
.vp-avatar.me{background:linear-gradient(135deg,var(--accent-green),var(--accent-green-dark));color:#fff}
.vp-name{font-size:13px;font-weight:600}
.vp-color{font-size:10px;color:var(--text-muted);margin-top:1px}
.vp-result-label{font-size:11px;font-weight:700;padding:3px 8px;border-radius:6px}
.vp-result-label.win{background:rgba(127,166,80,.2);color:var(--accent-green-bright)}
.vp-result-label.lose{background:rgba(192,64,64,.15);color:#e07070}
.vp-result-label.draw{background:rgba(160,160,160,.12);color:var(--text-secondary)}
#viewer-board-wrap{width:100%;max-width:560px;aspect-ratio:1;position:relative;display:block}
/* ── 화살표 오버레이 ── */
.board-arrow-overlay{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:10}
/* ── 수 어노테이션 배지 ── */
.move-arrow-badge{display:inline-flex;align-items:center;gap:2px;font-size:9px;color:rgba(255,165,0,.9);margin-left:3px;vertical-align:middle;cursor:default}
.move-arrow-badge svg{flex-shrink:0}
/* ── 후보수 툴팁 ── */
.move-san{position:relative}
#viewer-board{position:absolute;top:0;left:0;width:100%;height:100%;display:grid;grid-template-columns:repeat(8,1fr);border:2px solid var(--border-light);border-radius:4px;overflow:hidden;user-select:none}
.vsq{aspect-ratio:1;display:flex;align-items:center;justify-content:center;position:relative}
.vsq.light{background:var(--board-light)}.vsq.dark{background:var(--board-dark)}
.vsq.last-from{background:rgba(205,210,106,.5)!important}.vsq.last-to{background:rgba(205,210,106,.7)!important}
.vsq.in-check{background:rgba(220,50,50,.55)!important}
.vsq .rank-label{position:absolute;left:2px;top:1px;font-size:9px;font-weight:700;opacity:.5;pointer-events:none}
.vsq .file-label{position:absolute;right:2px;bottom:0;font-size:9px;font-weight:700;opacity:.5;pointer-events:none}
.vsq .piece-img{width:88%;height:88%;object-fit:contain;pointer-events:none;filter:drop-shadow(0 1px 2px rgba(0,0,0,.4))}
.vsq .piece-img.black-piece{filter:drop-shadow(0 0 1px rgba(180,180,180,.9)) drop-shadow(0 0 1px rgba(150,150,150,.7)) drop-shadow(0 1px 2px rgba(0,0,0,.5))}
.viewer-main{display:flex;flex-direction:column;gap:14px;width:100%;max-width:880px;align-items:stretch;justify-content:center}
.viewer-side{display:flex;flex-direction:column;gap:8px;flex:1;min-width:0}
.viewer-controls{display:flex;align-items:center;gap:6px;width:100%;background:var(--bg-secondary);border:1px solid var(--border);border-radius:12px;padding:8px 12px}
.ctrl-btn{width:36px;height:36px;border-radius:8px;background:transparent;border:1px solid var(--border-light);color:var(--text-secondary);cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;transition:all .15s}
.ctrl-btn:hover:not(:disabled){background:var(--bg-hover);color:var(--text-primary)}.ctrl-btn:disabled{opacity:.3;cursor:not-allowed}
.ctrl-move-info{flex:1;text-align:center;font-size:12px;color:var(--text-secondary)}
.ctrl-move-num{font-size:13px;font-weight:700;color:var(--text-primary)}
.viewer-moves{width:100%;background:var(--bg-secondary);border:1px solid var(--border);border-radius:12px;padding:10px 12px;max-height:220px;overflow-y:auto}
.viewer-moves::-webkit-scrollbar{height:3px;width:3px}
.viewer-moves::-webkit-scrollbar-thumb{background:var(--border-light);border-radius:2px}
.move-tokens{display:flex;flex-direction:column;gap:2px;line-height:1.6}
.move-row{display:flex;align-items:center;flex-wrap:wrap;gap:4px}
.move-num{font-size:11px;color:var(--text-muted);margin-right:4px;min-width:28px}
.move-san{font-size:12px;font-weight:600;color:var(--text-secondary);padding:1px 5px;border-radius:4px;cursor:pointer;transition:background .1s,color .1s}
.move-san:hover{background:var(--bg-hover);color:var(--text-primary)}.move-san.active{background:var(--accent-green-dark);color:#fff}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

@media (min-width: 900px){
  #viewer-container{align-items:center}
  .viewer-main{flex-direction:row;align-items:flex-start}
  #viewer-board-wrap{max-width:600px}
}

/* STATS PANEL */
#stats-panel{display:none;flex:1;overflow-y:auto;padding:28px;background:var(--bg-primary)}
#stats-panel::-webkit-scrollbar{width:4px}
#stats-panel::-webkit-scrollbar-thumb{background:var(--border-light);border-radius:2px}
.stats-header{margin-bottom:24px}
.stats-title{font-family:var(--font-display);font-size:1.6rem;font-weight:900;color:var(--text-primary);margin-bottom:4px}
.stats-sub{font-size:12px;color:var(--text-muted)}
.stats-loading{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;height:260px;color:var(--text-muted)}
.stats-spinner{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--accent-green);border-radius:50%;animation:spin .8s linear infinite}
.stats-progress-wrap{width:260px;text-align:center}
.stats-progress-bar-outer{width:100%;height:6px;background:var(--bg-tertiary);border-radius:3px;overflow:hidden;margin-top:10px}
.stats-progress-bar-fill{height:100%;background:linear-gradient(90deg,var(--accent-green-dark),var(--accent-green-bright));border-radius:3px;transition:width .3s}
.stats-progress-label{font-size:11px;color:var(--text-muted);margin-top:6px}
@keyframes spin{to{transform:rotate(360deg)}}
.wdl-row{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:24px}
.wdl-card{background:var(--bg-secondary);border:1px solid var(--border);border-radius:14px;padding:16px;text-align:center}
.wdl-card.win{border-color:rgba(127,166,80,.45)}.wdl-card.lose{border-color:rgba(192,64,64,.35)}
.wdl-num{font-family:var(--font-display);font-size:2.2rem;font-weight:900;line-height:1}
.wdl-card.win .wdl-num{color:var(--accent-green-bright)}.wdl-card.lose .wdl-num{color:#e07070}.wdl-card.draw .wdl-num{color:var(--text-secondary)}
.wdl-label{font-size:11px;color:var(--text-muted);margin-top:4px}
.winrate-bar-wrap{background:var(--bg-secondary);border:1px solid var(--border);border-radius:14px;padding:16px;margin-bottom:24px}
.winrate-bar-label{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.winrate-bar-title{font-size:12px;font-weight:600;color:var(--text-secondary)}
.winrate-bar-pct{font-size:14px;font-weight:700;color:var(--accent-green-bright)}
.winrate-bar{height:8px;background:var(--bg-tertiary);border-radius:4px;overflow:hidden}
.winrate-bar-fill{height:100%;background:linear-gradient(90deg,var(--accent-green-dark),var(--accent-green-bright));border-radius:4px;transition:width .6s ease}
.stats-section-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--text-muted);margin-bottom:10px;margin-top:24px}
.color-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:8px}
.color-card{background:var(--bg-secondary);border:1px solid var(--border);border-radius:14px;padding:14px 16px}
.color-card-title{font-size:12px;color:var(--text-muted);margin-bottom:8px}
.color-stat-row{display:flex;justify-content:space-between;font-size:12px;color:var(--text-secondary);margin-bottom:4px}
.color-stat-row span:last-child{font-weight:700;color:var(--text-primary)}
.key-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:8px}
.key-card{background:var(--bg-secondary);border:1px solid var(--border);border-radius:14px;padding:16px;display:flex;align-items:center;gap:12px}
.key-card-icon{font-size:26px;flex-shrink:0}
.key-card-body{flex:1;min-width:0}
.key-card-name{font-size:11px;color:var(--text-secondary)}
.key-card-num{font-family:var(--font-display);font-size:1.8rem;font-weight:900;line-height:1.1;color:var(--text-primary)}
.key-card-sub{font-size:10px;color:var(--text-muted);margin-top:2px}
.key-card.danger .key-card-num{color:#e07070}.key-card.good .key-card-num{color:var(--accent-green-bright)}.key-card.warn .key-card-num{color:#e0b040}
/* FVM bars */
.fvm-section{margin-bottom:8px}
.fvm-row{background:var(--bg-secondary);border:1px solid var(--border);border-radius:14px;padding:14px 16px;margin-bottom:8px;display:flex;align-items:center;gap:14px}
.fvm-piece-col{display:flex;flex-direction:column;align-items:center;min-width:52px;flex-shrink:0}
.fvm-piece-icon{font-size:26px;line-height:1}
.fvm-piece-name{font-size:10px;color:var(--text-muted);margin-top:3px;font-weight:600}
.fvm-piece-total{font-size:9px;color:var(--text-muted);margin-top:1px}
.fvm-bars-col{flex:1;min-width:0}
.fvm-bar-row{display:flex;align-items:center;gap:8px;margin-bottom:5px}
.fvm-bar-row:last-child{margin-bottom:0}
.fvm-pct{font-size:11px;font-weight:700;min-width:44px;flex-shrink:0}
.fvm-pct.found{color:var(--accent-green-bright)}.fvm-pct.missed{color:#e07070}
.fvm-track{flex:1;height:6px;background:var(--bg-tertiary);border-radius:3px;overflow:hidden}
.fvm-fill{height:100%;border-radius:3px;transition:width .5s ease}
.fvm-fill.found{background:linear-gradient(90deg,var(--accent-green-dark),var(--accent-green-bright))}
.fvm-fill.missed{background:linear-gradient(90deg,#c04040,#e07070)}
.fvm-count{font-size:11px;font-weight:700;color:var(--text-primary);min-width:28px;text-align:right;flex-shrink:0}
.avg-moves-card{background:var(--bg-secondary);border:1px solid var(--border);border-radius:14px;padding:16px;display:flex;align-items:center;gap:16px;margin-bottom:8px}
.avg-moves-num{font-family:var(--font-display);font-size:2.6rem;font-weight:900;color:var(--accent-green-bright);flex-shrink:0}
.avg-moves-desc{font-size:12px;color:var(--text-muted);line-height:1.6}
.end-list{display:flex;flex-direction:column;gap:8px;margin-bottom:8px}
.end-item{display:flex;align-items:center;gap:10px}
.end-label{font-size:12px;color:var(--text-secondary);flex:1}
.end-bar-wrap{width:100px;height:6px;background:var(--bg-tertiary);border-radius:3px;overflow:hidden}
.end-bar-fill{height:100%;background:var(--accent-green-dark);border-radius:3px}
.end-count{font-size:12px;font-weight:700;color:var(--text-primary);min-width:28px;text-align:right}
.stats-note{font-size:10px;color:var(--text-muted);margin-top:6px;line-height:1.5}

/* OPENING STATS */
.opening-stats-grid { display: flex; flex-direction: column; gap: 8px; margin-bottom: 8px; }
.opening-stat-row {
  background: var(--bg-secondary); border: 1px solid var(--border);
  border-radius: 12px; padding: 12px 14px;
  display: flex; align-items: center; gap: 12px;
  cursor: default; transition: border-color .15s;
}
.opening-stat-row:hover { border-color: var(--accent-green-dark); }
.opening-eco-badge {
  font-size: 10px; font-weight: 800; font-family: monospace;
  color: var(--move-book, #b07030);
  background: rgba(176,112,48,.15);
  border: 1px solid rgba(176,112,48,.3);
  padding: 3px 7px; border-radius: 5px; flex-shrink: 0;
  min-width: 36px; text-align: center;
}
.opening-stat-info { flex: 1; min-width: 0; }
.opening-stat-name { font-size: 12px; font-weight: 700; color: var(--text-primary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.opening-stat-var  { font-size: 10px; color: var(--text-muted); margin-top: 1px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.opening-stat-bars { display: flex; flex-direction: column; gap: 3px; min-width: 120px; flex-shrink: 0; }
.opening-bar-row { display: flex; align-items: center; gap: 6px; font-size: 10px; }
.opening-bar-label { color: var(--text-muted); min-width: 18px; font-size: 9px; font-weight: 700; }
.opening-bar-track { flex: 1; height: 5px; background: var(--bg-tertiary); border-radius: 3px; overflow: hidden; min-width: 60px; }
.opening-bar-fill { height: 100%; border-radius: 3px; transition: width .5s ease; }
.opening-bar-fill.white { background: linear-gradient(90deg, #b8b8b8, #e8e8e8); }
.opening-bar-fill.black { background: linear-gradient(90deg, #4a4a4a, #888888); }
.opening-bar-count { font-size: 10px; font-weight: 700; color: var(--text-primary); min-width: 22px; text-align: right; }
.opening-wdl { display: flex; gap: 3px; margin-top: 4px; }
.owdl { font-size: 9px; font-weight: 700; padding: 1px 5px; border-radius: 4px; }
.owdl.w { background: rgba(127,166,80,.2); color: var(--accent-green-bright); }
.owdl.d { background: rgba(160,160,160,.12); color: var(--text-secondary); }
.owdl.l { background: rgba(192,64,64,.15); color: #e07070; }
.opening-color-badge { font-size: 10px; flex-shrink: 0; }
.opening-games-count { font-size: 10px; color: var(--text-muted); flex-shrink: 0; }
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--bg-tertiary);border:1px solid var(--border-light);color:var(--text-primary);padding:10px 20px;border-radius:20px;font-size:13px;font-weight:500;opacity:0;transition:opacity .3s;pointer-events:none;z-index:999}
#toast.show{opacity:1}

/* TACTIC DETAIL MODAL */
#tactic-modal{display:none;position:fixed;inset:0;z-index:1000;align-items:center;justify-content:center;background:rgba(0,0,0,.6);backdrop-filter:blur(4px)}
#tactic-modal.show{display:flex}
.tmodal-box{background:var(--bg-secondary);border:1px solid var(--border-light);border-radius:18px;width:480px;max-width:94vw;max-height:80vh;display:flex;flex-direction:column;overflow:hidden;box-shadow:0 24px 64px rgba(0,0,0,.5)}
.tmodal-head{padding:18px 20px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.tmodal-title{font-size:15px;font-weight:700;color:var(--text-primary);display:flex;align-items:center;gap:8px}
.tmodal-close{width:30px;height:30px;border-radius:8px;background:transparent;border:1px solid var(--border-light);color:var(--text-secondary);cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;transition:all .15s}
.tmodal-close:hover{background:var(--bg-hover);color:var(--text-primary)}
.tmodal-body{overflow-y:auto;padding:14px 16px;flex:1}
.tmodal-body::-webkit-scrollbar{width:4px}
.tmodal-body::-webkit-scrollbar-thumb{background:var(--border-light);border-radius:2px}
.tmodal-empty{text-align:center;padding:32px 0;color:var(--text-muted);font-size:13px}
.tmodal-game-item{background:var(--bg-card);border:1px solid var(--border);border-radius:12px;padding:12px 14px;margin-bottom:8px;cursor:pointer;transition:border-color .15s,background .15s}
.tmodal-game-item:hover{border-color:var(--accent-green-dark);background:var(--bg-hover)}
.tg-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
.tg-players{font-size:12px;font-weight:600;color:var(--text-primary)}
.tg-result-badge{font-size:10px;font-weight:700;padding:2px 7px;border-radius:5px}
.tg-result-badge.win{background:rgba(127,166,80,.2);color:var(--accent-green-bright)}
.tg-result-badge.lose{background:rgba(192,64,64,.15);color:#e07070}
.tg-result-badge.draw{background:rgba(160,160,160,.12);color:var(--text-secondary)}
.tg-meta{font-size:11px;color:var(--text-muted);display:flex;gap:10px;align-items:center}
.tg-tactic-tags{display:flex;flex-wrap:wrap;gap:4px;margin-top:6px}
.tg-tag{font-size:10px;font-weight:600;padding:2px 7px;border-radius:5px;background:rgba(192,64,64,.13);color:#e07070}
.tg-tag.found{background:rgba(127,166,80,.15);color:var(--accent-green-bright)}
.tmodal-section{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--text-muted);margin:14px 0 8px}
.fvm-row.clickable{cursor:pointer;transition:border-color .15s,background .15s}
.fvm-row.clickable:hover{border-color:var(--accent-green-dark);background:var(--bg-hover)}

})();

// PGN에서 UCI 수 배열 추출 (간단한 버전)
function pgnToUciMoves(pgn) {
  try {
    // parsePgnToStates가 이미 있으므로 그 결과 활용
    const states = parsePgnToStates(pgn);
    const uciArr = [];
    for(let i=1; i<Math.min(states.length, 21); i++){
      const m = states[i].move;
      if(!m) continue;
      const FILES = 'abcdefgh';
      const from = FILES[m.from[1]] + (8 - m.from[0]);
      const to   = FILES[m.to[1]]   + (8 - m.to[0]);
      uciArr.push(from + to + (m.promotion||''));
    }
    return uciArr;
  } catch(e){ return []; }
}

function detectOpening(uciMoves) {
  for(let len=uciMoves.length; len>=1; len--){
    const key=uciMoves.slice(0,len).join(' ');
    if(OPENING_DB.has(key)) return OPENING_DB.get(key);
  }
  return null;
}

// 오프닝 키 (eco+name 조합)
function openingKey(op){ return op.eco+'|'+op.name+(op.variation?'|'+op.variation:''); }

<script>

// Firestore 쿼리에 타임아웃 래퍼
function withTimeout(promise, ms=10000){
  return Promise.race([
    promise,
    new Promise((_,reject)=>setTimeout(()=>reject(new Error('요청 시간 초과 ('+ms/1000+'초)')),ms))
  ]);
}

let _loadingRecords=false;
async function loadRecords(){
  if(_loadingRecords)return; // 중복 실행 방지
  _loadingRecords=true;
  const listEl=document.getElementById('records-list'),subEl=document.getElementById('list-sub');

  try{
    let snap=null;
    // 1차 시도: orderBy 포함 (인덱스 있는 경우)
    try{
      snap=await withTimeout(
        _fbDb.collection('game_records').where('uid','==',_user.uid).orderBy('playedAt','desc').limit(50).get()
      );
    }catch(e1){
      // 인덱스 미생성 시 링크 안내
      if(e1.message&&e1.message.includes('index')){
        console.info('%c[Firebase] 복합 인덱스를 생성하면 정렬이 더 빨라집니다\n%c▶ https://console.firebase.google.com/v1/r/project/chess-education-464fc/firestore/indexes?create_composite=Clpwcm9qZWN0cy9jaGVzcy1lZHVjYXRpb24tNDY0ZmMvZGF0YWJhc2VzLyhkZWZhdWx0KS9jb2xsZWN0aW9uR3JvdXBzL2dhbWVfcmVjb3Jkcy9pbmRleGVzL18QARoHCgN1aWQQARoMCghwbGF5ZWRBdBACGgwKCF9fbmFtZV9fEAI',
          'color:#e0b040;font-weight:bold','color:#7fa650;text-decoration:underline');
      }
      // 2차 시도: orderBy 없이
      try{
        snap=await withTimeout(
          _fbDb.collection('game_records').where('uid','==',_user.uid).limit(50).get()
        );
      }catch(e2){
        throw new Error('데이터 로드 실패: '+e2.message);
      }
    }
    if(!snap){throw new Error('응답 없음');}
    const docs=[];snap.forEach(d=>docs.push({id:d.id,...d.data()}));
    // orderBy 없이 가져온 경우 클라이언트 측 정렬
    docs.sort((a,b)=>{
      const ta=a.playedAt?a.playedAt.seconds:0;
      const tb=b.playedAt?b.playedAt.seconds:0;
      return tb-ta;
    });
    subEl.textContent=`총 ${docs.length}게임`;
    if(!docs.length){listEl.innerHTML='<div class="empty-state"><div class="empty-icon">♟</div><div>아직 기록이 없습니다<br>온라인 대국을 플레이해보세요!</div></div>';return;}
    listEl.innerHTML='';
    docs.forEach(doc=>{
      const item=document.createElement('div');item.className='record-item';item.dataset.id=doc.id;
      const myColor=doc.myColor||'w',result=doc.result||'*';
      let badge='🤝',badgeClass='draw',label='무승부';
      if(result==='1-0'){badge=myColor==='w'?'W':'L';badgeClass=myColor==='w'?'win':'lose';label=myColor==='w'?'승리':'패배';}
      if(result==='0-1'){badge=myColor==='b'?'W':'L';badgeClass=myColor==='b'?'win':'lose';label=myColor==='b'?'승리':'패배';}
      const dateStr=doc.playedAt?new Date(doc.playedAt.seconds*1000).toLocaleDateString('ko-KR',{month:'short',day:'numeric'}):'—';
      item.innerHTML=`<div class="record-result-badge ${badgeClass}">${badge}</div><div class="record-info"><div class="record-players">${doc.whiteName||'백'} vs ${doc.blackName||'흑'}</div><div class="record-meta"><span>${label}</span><span>${doc.moveCount||0}수</span><span>${dateStr}</span></div></div>`;
      item.addEventListener('click',()=>openRecord(doc,item));
      listEl.appendChild(item);
    });
  }catch(e){
    console.error('[loadRecords] 최종 실패:', e);
    listEl.innerHTML=`<div class="empty-state"><div class="empty-icon">⚠️</div><div>불러오기 실패<br><small style="font-size:10px;color:var(--text-muted)">${e.message}</small><br><button onclick="retryLoadRecords()" style="margin-top:12px;padding:7px 16px;border-radius:8px;border:1px solid var(--border-light);background:var(--bg-tertiary);color:var(--text-secondary);font-size:12px;cursor:pointer;font-family:var(--font-main)">🔄 다시 시도</button></div></div>`;
  }finally{
    _loadingRecords=false;
  }
}

function retryLoadRecords(){
  loadRecords();
}

function openRecord(doc,itemEl){
  document.querySelectorAll('.record-item').forEach(i=>i.classList.remove('active'));

const _SOUND_BASE='sound/';const _viewSounds={};
['move','capture','castle','check','checkmate','stalemate'].forEach(k=>{const a=new Audio(_SOUND_BASE+'chess_'+k+'.mp3');a.preload='auto';_viewSounds[k]=a;});
function playViewSound(type){const a=_viewSounds[type];if(!a)return;try{const c=a.cloneNode();c.volume=0.7;c.play().catch(()=>{});}catch(e){}}
function getViewSoundType(state){
  if(!state||!state.move)return null;
  const move=state.move,prevBoard=_states[_viewIdx-1]?.board;
  const isCapture=prevBoard&&prevBoard[move.to[0]]&&prevBoard[move.to[0]][move.to[1]];
  const nb=state.board,nextTurn=state.turn;
  if(isInCheck(nb,nextTurn)){const leg=getAllLegal(nb,nextTurn,state.castling,state.enPassant);return leg.length===0?'checkmate':'check';}
  const leg2=getAllLegal(nb,nextTurn,state.castling,state.enPassant);
  if(!isInCheck(nb,nextTurn)&&leg2.length===0)return'stalemate';
  if(move.castle)return'castle';
  if(isCapture||move.enPassant)return'capture';
  return'move';
}
function goToMove(idx){
  const prevIdx=_viewIdx;
  idx=Math.max(0,Math.min(_states.length-1,idx));_viewIdx=idx;
  renderViewerBoard();updateControls();highlightMoveToken(idx);
  redrawViewerArrows(); // ← 화살표 다시 그리기

function renderMoveTokens(){

function renderViewerBoard(){
  const el=document.getElementById('viewer-board');if(!el)return;el.innerHTML='';
  const state=_states[_viewIdx],board=state.board,flipped=_viewMyColor==='b',lastMove=state.move,turn=state.turn;
  for(let ri=0;ri<8;ri++)for(let ci=0;ci<8;ci++){
    const r=flipped?7-ri:ri,c=flipped?7-ci:ci;
    const sq=document.createElement('div');sq.className='vsq '+((r+c)%2===0?'light':'dark');
    if(ci===0){const lbl=document.createElement('span');lbl.className='rank-label';lbl.textContent=8-r;sq.appendChild(lbl);}
    if(ri===7){const lbl=document.createElement('span');lbl.className='file-label';lbl.textContent=FILES[c];sq.appendChild(lbl);}
    if(lastMove){if(lastMove.from[0]===r&&lastMove.from[1]===c)sq.classList.add('last-from');if(lastMove.to[0]===r&&lastMove.to[1]===c)sq.classList.add('last-to');}

document.addEventListener('keydown',e=>{
  if(!_states.length)return;
  if(e.key==='ArrowLeft'){e.preventDefault();goToMove(_viewIdx-1);}
  if(e.key==='ArrowRight'){e.preventDefault();goToMove(_viewIdx+1);}
  if(e.key==='Home'){e.preventDefault();goToMove(0);}
  if(e.key==='End'){e.preventDefault();goToMove(_states.length-1);}
});
function showToast(msg,duration=2500){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),duration);}

// 탭 전환
// ════════════════════════════════════════
function switchTab(tab){
  const lp=document.getElementById('list-panel'),vp=document.getElementById('viewer-panel'),sp=document.getElementById('stats-panel');
  const rb=document.getElementById('tab-records-btn'),sb=document.getElementById('tab-stats-btn');
  if(tab==='records'){
    if(rb)rb.classList.add('active');
    if(sb)sb.classList.remove('active');
    if(lp)lp.style.display='';
    if(vp)vp.style.display='';
    if(sp)sp.style.display='none';
  }else{
    if(sb)sb.classList.add('active');
    if(rb)rb.classList.remove('active');
    if(lp)lp.style.display='none';
    if(vp)vp.style.display='none';
    // 통계 탭 전환 시 항상 최신 상태 반영 (캐시 무효화 → 새 기보 자동 감지)
    _statsCache=null;
    if(sp){sp.style.display='block';renderStats();}
  }
}

// ════════════════════════════════════════
// 통계 분석
// ════════════════════════════════════════
let _statsCache=null;
let _statsGameDetails=[];  // 게임별 전술 상세 [{doc, tacticEvents}]

async function renderStats(){
  const contentEl=document.getElementById('stats-content'),subEl=document.getElementById('stats-sub');
  if(_statsCache){renderStatsHTML(_statsCache);return;}

  if(!_sfReady){
    contentEl.innerHTML=`<div class="stats-loading"><div class="stats-spinner"></div><div>Stockfish 초기화 중...</div></div>`;
    try{await initStockfish();}
    catch(e){
      contentEl.innerHTML=`<div class="empty-state"><div class="empty-icon">⚠️</div><div>Stockfish 로드 실패<br><small style="font-size:10px">chess/stockfish/stockfish-18-single.js 경로 확인</small></div></div>`;
      return;
    }
  }

  let docs=[];
  try{
    let snap=null;
    try{snap=await _fbDb.collection('game_records').where('uid','==',_user.uid).orderBy('playedAt','desc').limit(50).get();}
    catch(e){snap=await _fbDb.collection('game_records').where('uid','==',_user.uid).limit(50).get();}
    const seenIds=new Set();
    snap.forEach(d=>{if(!seenIds.has(d.id)){seenIds.add(d.id);docs.push({id:d.id,...d.data()});}});
  }catch(e){contentEl.innerHTML=`<div class="empty-state"><div class="empty-icon">⚠️</div><div>불러오기 실패: ${e.message}</div></div>`;return;}

  if(!docs.length){contentEl.innerHTML=`<div class="empty-state"><div class="empty-icon">📊</div><div>분석할 기록이 없습니다</div></div>`;return;}

  let wins=0,losses=0,draws=0,winsW=0,lossesW=0,drawsW=0,winsB=0,lossesB=0,drawsB=0;
  let endCheckmate=0,endResign=0,endDraw=0,endTimeout=0;
  const myColor_counts={w:0,b:0};let totalMovesSum=0;
  let sumMyBlunders=0,sumMyMistakes=0,sumMyInaccuracies=0;
  let sumOppBlunders=0,sumOppMistakes=0,sumOppBF=0,sumOppBM=0;
  let sumCheckmates=0,sumAbsPinFound=0,sumAbsPinMissed=0,sumRelPinFound=0,sumRelPinMissed=0;
  let sumForkFound={P:0,N:0,B:0,R:0,Q:0,K:0},sumForkMissed={P:0,N:0,B:0,R:0,Q:0,K:0},sumOppForkCreated={P:0,N:0,B:0,R:0,Q:0,K:0};
  let sumCp=0,sumMoves=0;
  const total=docs.length;
  _statsGameDetails=[];
  // 오프닝별 통계 맵: key -> {eco, name, variation, w:{wins,draws,losses}, b:{wins,draws,losses}}
  const openingStatsMap = new Map();

  // ── 이미 분석된 게임 수 카운트
  let cachedCount = 0;
  let newlyAnalyzedCount = 0;

  for(let gi=0;gi<docs.length;gi++){
    const doc=docs[gi];
    const myColor=doc.myColor||'w',result=doc.result||'*';
    myColor_counts[myColor]++;
    const myWin=(result==='1-0'&&myColor==='w')||(result==='0-1'&&myColor==='b');
    const myLose=(result==='0-1'&&myColor==='w')||(result==='1-0'&&myColor==='b');
    if(myWin){wins++;if(myColor==='w')winsW++;else winsB++;}
    else if(myLose){losses++;if(myColor==='w')lossesW++;else lossesB++;}
    else{draws++;if(myColor==='w')drawsW++;else drawsB++;}
    const term=(doc.termination||'').toLowerCase();
    if(term.includes('checkmate')||term.includes('체크메이트'))endCheckmate++;
    else if(term.includes('resign')||term.includes('기권'))endResign++;
    else if(term.includes('time')||term.includes('시간'))endTimeout++;
    else endDraw++;

    // 오프닝 감지
    if(doc.pgn){
      try {
        const uciArr = pgnToUciMoves(doc.pgn);
        const op = detectOpening(uciArr);
        if(op){
          const k = openingKey(op);
          if(!openingStatsMap.has(k)) openingStatsMap.set(k,{eco:op.eco,name:op.name,variation:op.variation,w:{wins:0,draws:0,losses:0,total:0},b:{wins:0,draws:0,losses:0,total:0}});
          const entry = openingStatsMap.get(k);
          const colorStats = entry[myColor];
          colorStats.total++;
          if(myWin) colorStats.wins++;
          else if(myLose) colorStats.losses++;
          else colorStats.draws++;
        }
      } catch(e){}
    }

    // ── 이미 분석된 게임인지 확인 (tacticAnalysis 필드 체크)
    const alreadyAnalyzed = !!(doc.tacticAnalysis && doc.tacticAnalysis.analyzedAt);

    if(alreadyAnalyzed){
      // 저장된 분석 결과 재사용
      cachedCount++;
      const a = doc.tacticAnalysis;
      sumMyBlunders+=(a.myBlunders||0);sumMyMistakes+=(a.myMistakes||0);sumMyInaccuracies+=(a.myInaccuracies||0);
      sumOppBlunders+=(a.oppBlunders||0);sumOppMistakes+=(a.oppMistakes||0);
      sumOppBF+=(a.oppBlunderFound||0);sumOppBM+=(a.oppBlunderMissed||0);
      sumCheckmates+=(a.checkmates||0);
      sumAbsPinFound+=(a.absPinFound||0);sumAbsPinMissed+=(a.absPinMissed||0);
      sumRelPinFound+=(a.relPinFound||0);sumRelPinMissed+=(a.relPinMissed||0);
      sumCp+=(a.myCpSum||0);sumMoves+=(a.myMoveCount||0);totalMovesSum+=(a.totalMoves||doc.moveCount||0);
      const ff=a.forkFound||{};const fm=a.forkMissed||{};const ofc=a.oppForkCreated||{};
      for(const k of['P','N','B','R','Q','K']){sumForkFound[k]+=(ff[k]||0);sumForkMissed[k]+=(fm[k]||0);sumOppForkCreated[k]+=(ofc[k]||0);}
      if(a.tacticEvents&&a.tacticEvents.length)_statsGameDetails.push({doc,tacticEvents:a.tacticEvents});

      const pct=Math.round(gi/total*100);
      contentEl.innerHTML=`<div class="stats-loading"><div class="stats-spinner"></div><div class="stats-progress-wrap">
        <div style="font-size:13px;color:var(--text-secondary)">분석 중... (${cachedCount}개 캐시 사용)</div>
        <div style="font-size:11px;color:var(--text-muted);margin-top:4px">${gi+1} / ${total} 게임</div>
        <div class="stats-progress-bar-outer"><div class="stats-progress-bar-fill" style="width:${pct}%"></div></div>
        <div class="stats-progress-label">이미 분석된 기보 — 건너뜀 ⚡</div>
      </div></div>`;
      continue;
    }

    // ── 새로 분석 필요한 게임
    const pct=Math.round(gi/total*100);
    contentEl.innerHTML=`<div class="stats-loading"><div class="stats-spinner"></div><div class="stats-progress-wrap">
      <div style="font-size:13px;color:var(--text-secondary)">Stockfish 분석 중... (신규 ${newlyAnalyzedCount+1}번째)</div>
      <div style="font-size:11px;color:var(--text-muted);margin-top:4px">${gi+1} / ${total} 게임</div>
      <div class="stats-progress-bar-outer"><div class="stats-progress-bar-fill" style="width:${pct}%"></div></div>
      <div class="stats-progress-label">깊이 ${SF_DEPTH}으로 포지션 분석 중</div>
    </div></div>`;

    if(doc.pgn){
      try{
        const a=await analyzeGame(doc.pgn,myColor,(cur,tot)=>{
          const ip=Math.round(cur/Math.max(tot,1)*100);
          const fill=contentEl.querySelector('.stats-progress-bar-fill');
          if(fill)fill.style.width=Math.round(gi/total*100+ip/total)+'%';
        });
        sumMyBlunders+=a.myBlunders;sumMyMistakes+=a.myMistakes;sumMyInaccuracies+=a.myInaccuracies;
        sumOppBlunders+=a.oppBlunders;sumOppMistakes+=a.oppMistakes;
        sumOppBF+=a.oppBlunderFound;sumOppBM+=a.oppBlunderMissed;
        sumCheckmates+=a.checkmates;
        sumAbsPinFound+=(a.absPinFound||0);sumAbsPinMissed+=(a.absPinMissed||0);
        sumRelPinFound+=(a.relPinFound||0);sumRelPinMissed+=(a.relPinMissed||0);
        sumCp+=a.myCpSum;sumMoves+=a.myMoveCount;totalMovesSum+=a.totalMoves;
        for(const k of['P','N','B','R','Q','K']){sumForkFound[k]+=(a.forkFound[k]||0);sumForkMissed[k]+=(a.forkMissed[k]||0);sumOppForkCreated[k]+=(a.oppForkCreated?.[k]||0);}
        if(a.tacticEvents&&a.tacticEvents.length)_statsGameDetails.push({doc,tacticEvents:a.tacticEvents});
        newlyAnalyzedCount++;

        // ── 분석 결과를 Firestore에 저장 (다음 방문 시 재사용)
        try{
          const savePayload={
            myBlunders:a.myBlunders,myMistakes:a.myMistakes,myInaccuracies:a.myInaccuracies,
            oppBlunders:a.oppBlunders,oppMistakes:a.oppMistakes,
            oppBlunderFound:a.oppBlunderFound,oppBlunderMissed:a.oppBlunderMissed,
            checkmates:a.checkmates,
            absPinFound:a.absPinFound||0,absPinMissed:a.absPinMissed||0,
            relPinFound:a.relPinFound||0,relPinMissed:a.relPinMissed||0,
            myCpSum:a.myCpSum,myMoveCount:a.myMoveCount,totalMoves:a.totalMoves,
            forkFound:a.forkFound,forkMissed:a.forkMissed,oppForkCreated:a.oppForkCreated||{},
            tacticEvents:(a.tacticEvents||[]).map(ev=>({
              type:ev.type,subtype:ev.subtype,piece:ev.piece||'',
              moveNum:ev.moveNum||0,san:ev.san||'',
              plyIdx:ev.plyIdx||0,bestMove:ev.bestMove||null
            })),
            analyzedAt:firebase.firestore.FieldValue.serverTimestamp(),
            sfDepth:SF_DEPTH
          };
          await _fbDb.collection('game_records').doc(doc.id).update({tacticAnalysis:savePayload});
          console.log('[stats] 분석 저장 완료:', doc.id);
        }catch(saveErr){console.warn('[stats] 분석 저장 실패:', saveErr);}
      }catch(e){console.warn('게임 분석 실패:',e);if(doc.moveCount)totalMovesSum+=doc.moveCount;}
    }else if(doc.moveCount)totalMovesSum+=doc.moveCount;
  }

  _statsCache={
    total,wins,losses,draws,winsW,lossesW,drawsW,winsB,lossesB,drawsB,myColor_counts,
    avgMoves:total>0?Math.round(totalMovesSum/total):0,
    winRate:total>0?Math.round(wins/total*100):0,
    endCheckmate,endResign,endDraw,endTimeout,
    myBlunders:sumMyBlunders,myMistakes:sumMyMistakes,myInaccuracies:sumMyInaccuracies,
    oppBlunders:sumOppBlunders,oppMistakes:sumOppMistakes,
    oppBlunderFound:sumOppBF,oppBlunderMissed:sumOppBM,
    checkmates:sumCheckmates,
    forkFound:sumForkFound,forkMissed:sumForkMissed,oppForkCreated:sumOppForkCreated,
    absPinFound:sumAbsPinFound,absPinMissed:sumAbsPinMissed,
    relPinFound:sumRelPinFound,relPinMissed:sumRelPinMissed,
    pinFound:sumAbsPinFound+sumRelPinFound,
    pinMissed:sumAbsPinMissed+sumRelPinMissed,
    avgCpLoss:sumMoves>0?Math.round(sumCp/sumMoves):0,
    openingStats: Array.from(openingStatsMap.values())
      .sort((a,b)=>(b.w.total+b.b.total)-(a.w.total+a.b.total))
  };
  const cacheMsg = cachedCount > 0 ? ` · ${cachedCount}개 캐시 재사용, ${newlyAnalyzedCount}개 신규 분석` : ` · Stockfish 깊이 ${SF_DEPTH} 전체 분석`;
  subEl.textContent=`총 ${total}게임${cacheMsg}`;
  renderStatsHTML(_statsCache);
}

// ════════════════════════════════════════
// 전술 상세 모달
// ════════════════════════════════════════
function openTacticModal(tacticType,tacticPiece,icon,name,subtypeFilter){
  const modal=document.getElementById('tactic-modal');
  const titleEl=document.getElementById('tmodal-title');
  const bodyEl=document.getElementById('tmodal-body');

  const typeLabel={fork:'포크',oppFork:'상대 포크',absPin:'절대 핀',relPin:'상대 핀',pin:'핀',oppBlunder:'상대 블런더 포착'}[tacticType]||tacticType;
  const subtypeLabel=subtypeFilter==='found'?'찾음':subtypeFilter==='missed'?'놓침':'';
  titleEl.innerHTML=`<span>${icon}</span> ${name} — ${typeLabel}${subtypeLabel?' ('+subtypeLabel+')':''} 게임 목록`;

  // 해당 전술이 있는 게임만 필터
  const PIECE_ICONS={P:'♙',N:'♞',B:'♝',R:'♜',Q:'♛',K:'♚'};
  const matchingGames=_statsGameDetails.filter(gd=>
    gd.tacticEvents.some(ev=>
      ev.type===tacticType&&
      (tacticPiece===''||ev.piece===tacticPiece)&&
      (!subtypeFilter||ev.subtype===subtypeFilter)
    )
  );

  if(!matchingGames.length){
    bodyEl.innerHTML=`<div class="tmodal-empty">해당 전술 기록이 없습니다</div>`;
    modal.classList.add('show');return;
  }

  let html='';
  for(const gd of matchingGames){
    const doc=gd.doc;
    const myColor=doc.myColor||'w',result=doc.result||'*';
    const myWin=(result==='1-0'&&myColor==='w')||(result==='0-1'&&myColor==='b');
    const myLose=(result==='0-1'&&myColor==='w')||(result==='1-0'&&myColor==='b');
    const resLabel=myWin?'승리':myLose?'패배':'무승부';
    const resCls=myWin?'win':myLose?'lose':'draw';
    const dateStr=doc.playedAt?new Date(doc.playedAt.seconds*1000).toLocaleDateString('ko-KR',{month:'short',day:'numeric'}):'—';
    const whiteName=doc.whiteName||'백',blackName=doc.blackName||'흑';

    // 해당 게임에서 이 전술의 이벤트들
    const evs=gd.tacticEvents.filter(ev=>ev.type===tacticType&&(tacticPiece===''||ev.piece===tacticPiece)&&(!subtypeFilter||ev.subtype===subtypeFilter));
    const foundEvs=evs.filter(ev=>ev.subtype==='found');
    const missedEvs=evs.filter(ev=>ev.subtype==='missed');

    let tagHtml='';
    if(foundEvs.length)tagHtml+=foundEvs.map(ev=>`<span class="tg-tag found">${tacticType==='oppFork'?'⚔':'✔'} ${ev.moveNum}수${ev.piece&&ev.piece!==''?' '+PIECE_ICONS[ev.piece]:''} (${ev.san||'?'})</span>`).join('');
    if(missedEvs.length)tagHtml+=missedEvs.map(ev=>`<span class="tg-tag">✘ ${ev.moveNum}수${ev.piece&&ev.piece!==''?' '+PIECE_ICONS[ev.piece]:''} (${ev.san||'?'})</span>`).join('');

    html+=`<div class="tmodal-game-item" onclick="closeTacticModalAndOpen(${JSON.stringify(doc).replace(/"/g,'&quot;')})">
      <div class="tg-header">
        <div class="tg-players">⬜ ${whiteName} vs ⬛ ${blackName}</div>
        <div class="tg-result-badge ${resCls}">${resLabel}</div>
      </div>
      <div class="tg-meta"><span>${doc.moveCount||0}수</span><span>${dateStr}</span></div>
      <div class="tg-tactic-tags">${tagHtml}</div>
    </div>`;
  }
  bodyEl.innerHTML=html;
  modal.classList.add('show');
}

function closeTacticModal(){
  document.getElementById('tactic-modal').classList.remove('show');
}

function closeTacticModalAndOpen(doc){
  closeTacticModal();
  // 기보 탭으로 전환 후 해당 기보 열기
  switchTab('records');
  // 리스트에서 해당 게임 찾아 클릭
  setTimeout(()=>{
    const item=document.querySelector(`.record-item[data-id="${doc.id}"]`);
    if(item){item.click();item.scrollIntoView({behavior:'smooth',block:'nearest'});}
    else showToast('기보 목록에서 해당 게임을 선택해주세요');
  },120);
}

// ════════════════════════════════════════
// 오프닝 통계 렌더링
// ════════════════════════════════════════
function renderOpeningStats(openingStats) {
  if(!openingStats || !openingStats.length){
    return `<div class="stats-section-title">📖 오프닝 통계</div>
      <div class="stats-note" style="padding:8px 0">오프닝 데이터가 없습니다 (기보 필요)</div>`;
  }

  // 백으로 플레이한 것들 (w.total > 0)
  const whiteOps = openingStats.filter(o=>o.w.total>0).sort((a,b)=>b.w.total-a.w.total);
  // 흑으로 플레이한 것들 (b.total > 0)
  const blackOps = openingStats.filter(o=>o.b.total>0).sort((a,b)=>b.b.total-a.b.total);

  function opRow(op, colorKey) {
    const cs = op[colorKey];
    const tot = cs.total;
    if(!tot) return '';
    const maxVal = tot;
    const wPct = Math.round(cs.wins/tot*100);
    const dPct = Math.round(cs.draws/tot*100);
    const lPct = 100-wPct-dPct;
    const varText = op.variation ? `<div class="opening-stat-var">${op.variation}</div>` : '';
    return `<div class="opening-stat-row">
      <span class="opening-eco-badge">${op.eco}</span>
      <div class="opening-stat-info">
        <div class="opening-stat-name">${op.name}</div>
        ${varText}
        <div class="opening-wdl">
          <span class="owdl w">${cs.wins}승</span>
          <span class="owdl d">${cs.draws}무</span>
          <span class="owdl l">${cs.losses}패</span>
        </div>
      </div>
      <div class="opening-stat-bars">
        <div style="font-size:9px;color:var(--text-muted);text-align:right;margin-bottom:2px">${tot}게임 · 승률 ${wPct}%</div>
        <div style="height:8px;background:var(--bg-tertiary);border-radius:4px;overflow:hidden;display:flex;">
          <div style="height:100%;background:var(--accent-green-bright);width:${wPct}%;transition:width .5s"></div>
          <div style="height:100%;background:var(--text-muted);width:${dPct}%;transition:width .5s"></div>
          <div style="height:100%;background:#e07070;width:${lPct}%;transition:width .5s"></div>
        </div>
      </div>
    </div>`;
  }

  let html = `<div class="stats-section-title">📖 오프닝 통계</div>`;

  if(whiteOps.length){
    html += `<div class="stats-section-title" style="margin-top:12px;color:var(--text-secondary)">⬜ 백으로 플레이한 오프닝</div>
      <div class="opening-stats-grid">${whiteOps.slice(0,8).map(o=>opRow(o,'w')).join('')}</div>`;
  }
  if(blackOps.length){
    html += `<div class="stats-section-title" style="margin-top:12px;color:var(--text-secondary)">⬛ 흑으로 플레이한 오프닝</div>
      <div class="opening-stats-grid">${blackOps.slice(0,8).map(o=>opRow(o,'b')).join('')}</div>`;
  }
  html += `<div class="stats-note">※ 오프닝은 ECO 코드 기준으로 기보의 초반 수에서 자동 감지됩니다. 상위 8개 표시.</div>`;
  return html;
}

// ════════════════════════════════════════
// 통계 HTML 렌더링
// ════════════════════════════════════════
function renderStatsHTML(s){
  const contentEl=document.getElementById('stats-content');
  const endMax=Math.max(s.endCheckmate,s.endResign,s.endDraw,s.endTimeout,1);
  const PIECES=[{key:'P',icon:'♙',name:'폰'},{key:'N',icon:'♞',name:'나이트'},{key:'B',icon:'♝',name:'비숍'},{key:'R',icon:'♜',name:'룩'},{key:'Q',icon:'♛',name:'퀸'},{key:'K',icon:'♚',name:'킹'}];

  function fvmRow(icon,name,total_label,found,missed,tacticType,tacticPiece){
    const tot=found+missed;if(tot===0)return'';
    const fp=Math.round(found/tot*100),mp=100-fp;
    const clickAttr=tacticType?`onclick="openTacticModal('${tacticType}','${tacticPiece||''}','${icon}','${name}')" style="cursor:pointer"`:'';
    return`<div class="fvm-row${tacticType?' clickable':''}" ${clickAttr}>
      <div class="fvm-piece-col"><div class="fvm-piece-icon">${icon}</div><div class="fvm-piece-name">${name}</div><div class="fvm-piece-total">${tot}회</div></div>
      <div class="fvm-bars-col">
        <div class="fvm-bar-row"><span class="fvm-pct found">✔ ${fp}%</span><div class="fvm-track"><div class="fvm-fill found" style="width:${fp}%"></div></div><span class="fvm-count">${found}</span></div>

// 화살표 시스템 (게임 중 저장된 화살표 표시 — 읽기 전용)
// ════════════════════════════════════════
const FILES_ARR=['a','b','c','d','e','f','g','h'];
// 수 인덱스 → 화살표 배열 { fromCol,fromRow,toCol,toRow }
let _moveArrows={};

// ── game_records의 arrows 필드에서 불러오기 ──
function loadArrowsFromRecord(doc){
  _moveArrows={};
  if(!doc.arrows)return;
  // play.html 저장 형식: { "moveIndex": [{fc,fr,tc,tr,seq?},...] }
  // records.html 표시 형식: { moveIndex: [{fromCol,fromRow,toCol,toRow,seq?},...] }
  Object.entries(doc.arrows).forEach(([k,arr])=>{
    if(!arr||!arr.length)return;
    _moveArrows[parseInt(k)]=arr.map(a=>({
      fromCol:a.fc,fromRow:a.fr,toCol:a.tc,toRow:a.tr,
      seq:a.seq?true:undefined
    }));
  });
}

// 칸 이름 (col=0→a, row=0→rank8)
function sqName(col,row){ return FILES_ARR[col]+(8-row); }

// 800×800 viewBox 기준 칸 중앙 좌표 (뒤집기 고려)
function viewerSqCenter(col,row){
  const flipped=_viewMyColor==='b';
  const dispCol=flipped?7-col:col;
  const dispRow=flipped?7-row:row;
  return{px:dispCol*100+50,py:dispRow*100+50};
}

// SVG line 화살표 요소 생성
function makeViewerArrowEl(fromCol,fromRow,toCol,toRow,isSeq){
  const ARROW_COLOR_CAND='rgba(255,165,0,0.92)';
  const ARROW_COLOR_SEQ ='rgba(80,160,255,0.88)';
  const ARROW_COLOR=isSeq?ARROW_COLOR_SEQ:ARROW_COLOR_CAND;
  const markerId=isSeq?'viewer-arrow-head-seq':'viewer-arrow-head';
  const ARROW_SW=14;
  const SVG_NS='http://www.w3.org/2000/svg';
  const from=viewerSqCenter(fromCol,fromRow);
  const to=viewerSqCenter(toCol,toRow);
  const dx=to.px-from.px,dy=to.py-from.py;
  const len=Math.sqrt(dx*dx+dy*dy);if(len<1)return null;
  const ux=dx/len,uy=dy/len;
  const sx=from.px+ux*ARROW_SW*1.1,sy=from.py+uy*ARROW_SW*1.1;
  const ex=to.px-ux*ARROW_SW*2.4,ey=to.py-uy*ARROW_SW*2.4;
  if(Math.sqrt((ex-sx)**2+(ey-sy)**2)<5)return null;
  const line=document.createElementNS(SVG_NS,'line');
  line.setAttribute('x1',sx.toFixed(2));line.setAttribute('y1',sy.toFixed(2));
  line.setAttribute('x2',ex.toFixed(2));line.setAttribute('y2',ey.toFixed(2));
  line.setAttribute('stroke',ARROW_COLOR);
  line.setAttribute('stroke-width',ARROW_SW);
  line.setAttribute('stroke-linecap','round');
  line.setAttribute('marker-end',`url(#${markerId})`);
  return line;
}

// 현재 수(_viewIdx)의 화살표를 SVG에 다시 그리기
function redrawViewerArrows(){
  const g=document.getElementById('viewer-arrow-layer');
  if(!g)return;
  g.innerHTML='';
  const arrows=_moveArrows[_viewIdx]||[];
  arrows.forEach(a=>{
    const el=makeViewerArrowEl(a.fromCol,a.fromRow,a.toCol,a.toRow,!!a.seq);
    if(el)g.appendChild(el);
  });
}
